<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Feliz Cumpleaños! 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:    #f9c0cb;
    --lilac:   #d9b8e8;
    --sky:     #b8d8f0;
    --peach:   #ffd6b8;
    --mint:    #b8ead8;
    --cream:   #fdf6f0;
    --text:    #6b3a5c;
    --gold:    #e8c87a;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    cursor: none;
  }

  /* ── FONDO ANIMADO ─────────────────────────────────────── */
  body {
    background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e3f2fd, #fce4ec);
    background-size: 400% 400%;
    animation: gradShift 12s ease infinite;
    font-family: 'Cormorant Garamond', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }

  @keyframes gradShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── CURSOR PERSONALIZADO ──────────────────────────────── */
  .cursor {
    position: fixed;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle, #f9c0cb, #d9b8e8);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform .08s ease;
    box-shadow: 0 0 12px rgba(217,184,232,.7);
  }

  /* ── PARTÍCULAS FLOTANTES DE FONDO ─────────────────────── */
  .bg-particle {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: floatUp linear infinite;
    font-size: 18px;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: .55; }
    90%  { opacity: .4; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* ── CONTENEDOR CENTRAL ─────────────────────────────────── */
  #stage {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem 4rem;
    max-width: 720px;
    width: 90vw;
  }

  /* ── TARJETA ─────────────────────────────────────────────── */
  .card {
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid rgba(255,255,255,.8);
    border-radius: 32px;
    padding: 3.5rem 3rem;
    box-shadow:
      0 8px 40px rgba(249,192,203,.35),
      0 2px 8px rgba(217,184,232,.2),
      inset 0 1px 0 rgba(255,255,255,.9);
  }

  /* ── ÍCONO SUPERIOR ──────────────────────────────────────── */
  .icon-top {
    font-size: 3.2rem;
    display: block;
    margin-bottom: 1.2rem;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.12); }
  }

  /* ── TÍTULO ─────────────────────────────────────────────── */
  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-style: italic;
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: .6rem;
    text-shadow: 0 2px 12px rgba(107,58,92,.15);
  }

  /* ── MENSAJE ─────────────────────────────────────────────── */
  #message-wrap {
    min-height: 6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 1.4rem 0;
  }

  #message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 3vw, 1.65rem);
    font-weight: 300;
    color: #7a4a6e;
    line-height: 1.6;
    letter-spacing: .01em;
    will-change: opacity, transform;
  }

  /* ── COUNTER ─────────────────────────────────────────────── */
  .dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 1.2rem 0 1.8rem;
    flex-wrap: wrap;
  }

  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: rgba(217,184,232,.4);
    border: 1.5px solid rgba(217,184,232,.6);
    transition: all .35s ease;
  }

  .dot.active {
    background: var(--lilac);
    transform: scale(1.25);
    box-shadow: 0 0 6px rgba(217,184,232,.8);
  }

  .dot.done {
    background: var(--rose);
    border-color: var(--rose);
  }

  /* ── HINT TEXT ──────────────────────────────────────────── */
  #hint {
    font-size: .9rem;
    color: rgba(107,58,92,.5);
    letter-spacing: .08em;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    animation: blink 2.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: .5; }
    50%       { opacity: 1; }
  }

  /* ── BOTÓN REINICIAR ─────────────────────────────────────── */
  #btn-reset {
    display: none;
    margin: 1.4rem auto 0;
    padding: .65rem 2rem;
    border: 1.5px solid rgba(217,184,232,.8);
    border-radius: 999px;
    background: rgba(255,255,255,.6);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: .05em;
    cursor: pointer;
    transition: all .25s ease;
    backdrop-filter: blur(8px);
  }

  #btn-reset:hover {
    background: rgba(249,192,203,.5);
    transform: scale(1.04);
    box-shadow: 0 4px 16px rgba(249,192,203,.4);
  }

  /* ── CONFETTI ────────────────────────────────────────────── */
  .confetti-piece {
    position: fixed;
    width: 9px; height: 9px;
    pointer-events: none;
    z-index: 200;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: .8; }
    100% { transform: translateY(110vh) rotate(720deg) scale(.4); opacity: 0; }
  }

  /* ── CLICK BURST ─────────────────────────────────────────── */
  .burst {
    position: fixed;
    pointer-events: none;
    z-index: 300;
    font-size: 1.4rem;
    animation: burstAnim .7s ease forwards;
    transform-origin: center;
  }

  @keyframes burstAnim {
    0%   { transform: scale(0) translateY(0); opacity: 1; }
    60%  { transform: scale(1.3) translateY(-28px); opacity: .9; }
    100% { transform: scale(.8) translateY(-55px); opacity: 0; }
  }

  /* ── MESSAGE ANIMATION CLASSES ──────────────────────────── */
  @keyframes msgIn {
    0%   { opacity: 0; transform: scale(.88) translateY(16px); filter: blur(4px); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }

  @keyframes msgOut {
    0%   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    100% { opacity: 0; transform: scale(1.06) translateY(-14px); filter: blur(3px); }
  }

  .msg-enter { animation: msgIn .55s cubic-bezier(.22,.68,0,1.2) forwards; }
  .msg-exit  { animation: msgOut .3s ease forwards; }

  /* ── GLOW RING ───────────────────────────────────────────── */
  .glow-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249,192,203,.18) 0%, transparent 70%);
    pointer-events: none;
    animation: glowPulse 3s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: .6; }
    50%       { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
  }

  /* ── DECORATIVE LINES ────────────────────────────────────── */
  .deco {
    display: flex;
    align-items: center;
    gap: .8rem;
    margin: .9rem 0;
    color: rgba(217,184,232,.6);
  }

  .deco::before, .deco::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(217,184,232,.5), transparent);
  }

  .deco span {
    font-size: .75rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(107,58,92,.4);
    font-family: 'Cormorant Garamond', serif;
  }
</style>
</head>
<body>

<!-- Cursor -->
<div class="cursor" id="cursor"></div>

<!-- Glow de fondo -->
<div class="glow-ring"></div>

<!-- Escenario central -->
<div id="stage">
  <div class="card">
    <span class="icon-top" id="main-icon">🎂</span>
    <h1 class="title" id="main-title">¡Feliz Cumpleaños!</h1>
    <div class="deco"><span>✦</span></div>
    <div id="message-wrap">
      <p id="message">Hoy el universo se detuvo un instante para celebrar que existes.</p>
    </div>
    <div class="deco"><span>✦</span></div>
    <div class="dots" id="dots"></div>
    <p id="hint">toca la pantalla para continuar</p>
    <button id="btn-reset">✦ volver a empezar ✦</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   MENSAJES Y CONFIGURACIÓN
════════════════════════════════════════ */
const slides = [
  {
    icon: "🎂",
    title: "¡Feliz Cumpleaños!",
    msg: "Hoy el universo se detuvo un instante para celebrar que existes."
  },
  {
    icon: "🌸",
    title: "Un día especial",
    msg: "Que cada pétalo de este día lleve consigo un deseo cumplido y una sonrisa nueva."
  },
  {
    icon: "✨",
    title: "Brillas diferente",
    msg: "Hay personas que iluminan los cuartos con solo entrar. Tú eres una de ellas."
  },
  {
    icon: "🦋",
    title: "Libertad y vuelo",
    msg: "Que este año te lleve a lugares que todavía no imaginas, y te sorprenda en cada uno."
  },
  {
    icon: "🌙",
    title: "Sueños enormes",
    msg: "Tus sueños no son demasiado grandes. El mundo simplemente aún está aprendiendo a contenerlos."
  },
  {
    icon: "💫",
    title: "Eres magia",
    msg: "No existe ninguna otra persona en el mundo que piense, sienta y ame como tú lo haces. Eso te hace extraordinaria."
  },
  {
    icon: "🌺",
    title: "Todo florece",
    msg: "Como las flores en primavera, tú también tienes tu momento de florecer — y este es uno de ellos."
  },
  {
    icon: "🎶",
    title: "Canción para ti",
    msg: "Si la vida tuviera banda sonora, la tuya sería la más hermosa jamás compuesta."
  },
  {
    icon: "🍰",
    title: "Un regalo",
    msg: "El mayor regalo no es lo que recibes hoy, sino todo lo que tú ya eres para quienes te quieren."
  },
  {
    icon: "🌟",
    title: "Un año nuevo",
    msg: "Que cada mañana de este nuevo año llegue envuelta en posibilidades, y cada noche en gratitud."
  },
  {
    icon: "💖",
    title: "Con todo el amor",
    msg: "Que la vida te devuelva, multiplicado, todo el amor que has dado. Feliz cumpleaños, de todo corazón.",
    final: true
  }
];

const burstEmojis = ["💖","✨","🌸","🦋","⭐","🌺","💫","🎀","🌙","🍀"];
const confettiColors = ["#f9c0cb","#d9b8e8","#b8d8f0","#ffd6b8","#e8c87a","#b8ead8"];

let current = 0;
let animating = false;

/* ════ DOM ════ */
const cursor   = document.getElementById('cursor');
const msgEl    = document.getElementById('message');
const titleEl  = document.getElementById('main-title');
const iconEl   = document.getElementById('main-icon');
const hintEl   = document.getElementById('hint');
const btnReset = document.getElementById('btn-reset');
const dotsEl   = document.getElementById('dots');

/* ════ CURSOR ════ */
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

/* ════ DOTS ════ */
function buildDots() {
  dotsEl.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });
}

function updateDots(idx) {
  const all = dotsEl.querySelectorAll('.dot');
  all.forEach((d, i) => {
    d.classList.remove('active','done');
    if (i < idx)  d.classList.add('done');
    if (i === idx) d.classList.add('active');
  });
}

buildDots();

/* ════ TRANSICIÓN DE MENSAJE ════ */
function showSlide(idx, direction = 'in') {
  const s = slides[idx];
  if (direction === 'in') {
    iconEl.textContent  = s.icon;
    titleEl.textContent = s.title;

    msgEl.classList.remove('msg-enter','msg-exit');
    void msgEl.offsetWidth; // reflow
    msgEl.textContent = s.msg;
    msgEl.classList.add('msg-enter');
    updateDots(idx);

    if (s.final) {
      hintEl.style.display = 'none';
      btnReset.style.display = 'inline-block';
      launchConfetti(120);
    } else {
      hintEl.style.display = '';
      btnReset.style.display = 'none';
    }
  }
}

function advance() {
  if (animating) return;
  const next = current + 1;
  if (next >= slides.length) return;

  animating = true;
  msgEl.classList.remove('msg-enter');
  msgEl.classList.add('msg-exit');

  setTimeout(() => {
    current = next;
    showSlide(current, 'in');
    animating = false;
  }, 300);
}

/* ════ CLICK EN PANTALLA ════ */
document.addEventListener('click', e => {
  if (e.target === btnReset) return;
  spawnBurst(e.clientX, e.clientY);
  if (current < slides.length - 1) {
    advance();
  }
});

/* ════ RESET ════ */
btnReset.addEventListener('click', e => {
  e.stopPropagation();
  current = 0;
  animating = false;
  showSlide(0, 'in');
  buildDots();
  hintEl.style.display = '';
  btnReset.style.display = 'none';
});

/* ════ BURST DE EMOJIS AL CLICK ════ */
function spawnBurst(x, y) {
  const count = 4;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'burst';
    el.textContent = burstEmojis[Math.floor(Math.random() * burstEmojis.length)];
    const angle  = (Math.random() - .5) * 80;
    const spread = (Math.random() - .5) * 60;
    el.style.left   = (x + spread) + 'px';
    el.style.top    = (y - 10) + 'px';
    el.style.rotate = angle + 'deg';
    el.style.animationDelay = (i * 60) + 'ms';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }
}

/* ════ CONFETTI ════ */
function launchConfetti(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left  = Math.random() * 100 + 'vw';
      el.style.top   = '-12px';
      el.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      el.style.width  = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      el.style.animationDuration = (2.5 + Math.random() * 3) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }, i * 30);
  }
}

/* ════ PARTÍCULAS FLOTANTES DE FONDO ════ */
const bgSymbols = ["✦","♡","✿","❋","⋆","◌","✩","❀","·","✾"];

function spawnBgParticle() {
  const el = document.createElement('div');
  el.className = 'bg-particle';
  el.textContent = bgSymbols[Math.floor(Math.random() * bgSymbols.length)];
  el.style.left   = Math.random() * 100 + 'vw';
  el.style.color  = confettiColors[Math.floor(Math.random() * confettiColors.length)];
  el.style.fontSize = (12 + Math.random() * 14) + 'px';
  const dur = 9 + Math.random() * 14;
  el.style.animationDuration  = dur + 's';
  el.style.animationDelay     = -(Math.random() * dur) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 2) * 1000);
}

// Generar partículas continuamente
setInterval(spawnBgParticle, 700);
for (let i = 0; i < 12; i++) spawnBgParticle();

/* ════ INIT ════ */
showSlide(0, 'in');
</script>
</body>
</html>
